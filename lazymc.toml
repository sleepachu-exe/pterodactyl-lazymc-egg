# ============================================================
#  lazymc.toml — LazyMC Configuration
#  Public port is auto-patched at runtime by start.sh
# ============================================================

[public]
# Players yahan connect karte hain
# start.sh automatically Pterodactyl ke SERVER_PORT se patch karta hai
address = "0.0.0.0:25565"

[server]
# Actual Minecraft server ka internal port (public se alag HONA chahiye)
directory = "."
address = "127.0.0.1:25500"
command = "java -Xms128M -Xmx2048M -Dterminal.jline=false -Dterminal.ansi=true -jar server.jar --nogui"
wake_on_start = false
wake_on_crash = true

[time]
# Kitne seconds baad server sleep kare (koi player nahi)
# 180 = 3 minutes
sleep_after = 180
minimum_online_time = 60

[join]
# Player ko hold karo jab tak server start ho
hold = true
hold_timeout = 120

[rcon]
# LazyMC RCON use karta hai server ko safely stop karne ke liye
enabled = true
address = "127.0.0.1:25575"
password = "lazymc_rcon_pass"
